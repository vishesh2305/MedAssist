services:
  # ---------- Data Stores ----------
  postgres:
    image: postgres:15-alpine
    container_name: medassist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medassist
      POSTGRES_PASSWORD: medassist_secret
      POSTGRES_DB: medassist_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medassist -d medassist_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medassist-net

  redis:
    image: redis:7-alpine
    container_name: medassist-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medassist-net

  # ---------- Application Services ----------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: medassist-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://medassist:medassist_secret@postgres:5432/medassist_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-use-a-strong-secret
      JWT_ACCESS_SECRET: medassist-access-secret-key-2026
      JWT_REFRESH_SECRET: medassist-refresh-secret-key-2026
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000,http://localhost:8080
      SOCKET_CORS_ORIGINS: http://localhost:3001,http://localhost:3000,http://localhost:8080
      FRONTEND_URL: http://localhost:3001
      SMS_MOCK: "true"
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - medassist-net

  web:
    build:
      context: ./web
      dockerfile: ../docker/web.Dockerfile
    container_name: medassist-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      PORT: 3000
    ports:
      - "3001:3000"
    networks:
      - medassist-net

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: medassist-ai
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://redis:6379
      PORT: 8000
      ENVIRONMENT: production
      CORS_ORIGINS: http://localhost:3000,http://backend:4000
    ports:
      - "8001:8000"
    networks:
      - medassist-net

  nginx:
    image: nginx:alpine
    container_name: medassist-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - web
      - ai-services
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - medassist-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  medassist-net:
    driver: bridge
